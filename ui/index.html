<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teradata Agentic Demo</title>
    <style>
      :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
      body { margin: 0; background: #f1f5f9; color: #0f172a; }
      .app { padding: 16px; }
      .layout { display: grid; grid-template-columns: 1.25fr 1fr; gap: 12px; align-items: start; }
      .stack { display: grid; gap: 12px; }
      .pane { background: #fff; border: 1px solid #dbe3ee; border-radius: 12px; padding: 12px; box-shadow: 0 1px 2px rgba(15,23,42,.04); }
      .thread { max-height: 56vh; overflow-y: auto; display: grid; gap: 8px; }
      .msg { border-radius: 10px; border: 1px solid #dbe3ee; padding: 8px 10px; font-size: 14px; line-height: 1.4; }
      .msg-user { background: #eff6ff; }
      .msg-assistant { background: #f0fdf4; }
      .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
      input, select, button { border: 1px solid #cbd5e1; border-radius: 8px; padding: 6px 8px; font-size: 14px; }
      button { cursor: pointer; background: #fff; }
      pre { background: #0f172a; color: #dcfce7; border-radius: 8px; padding: 8px; overflow: auto; font-size: 12px; }
      table { width: 100%; border-collapse: collapse; font-size: 12px; }
      th, td { border-bottom: 1px solid #e2e8f0; text-align: left; padding: 4px; }
      .toolcard { background: #fff7ed; border: 1px solid #fdba74; border-radius: 8px; padding: 8px; margin-top: 8px; }
    </style>
  </head>
  <body>
    <main id="root" class="app"></main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
